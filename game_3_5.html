<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoKids Explorer 🌿 - Easy Level</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #4CAF50;
    --light-green: #A5D6A7;
    --sky: #87CEEB;
    --sun: #FFD54F;
    --earth: #8B5E3C;
    --leaf: #66BB6A;
    --white: #FFFDE7;
    --pink: #FF80AB;
    --orange: #FFA726;
    --purple: #CE93D8;
    --correct: #00E676;
    --wrong: #FF5252;
    --shadow: rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #b2ebf2 0%, #c8e6c9 50%, #fff9c4 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Floating background elements */
  .bg-shapes {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.7;
    animation: floatCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .leaf-bg {
    position: absolute;
    font-size: 2rem;
    animation: spinFloat linear infinite;
    opacity: 0.3;
  }
  @keyframes floatCloud {
    from { transform: translateX(-200px); }
    to { transform: translateX(110vw); }
  }
  @keyframes spinFloat {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
    50% { opacity: 0.6; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
  }

  /* Header */
  .header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 18px 20px 10px;
  }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    color: #2E7D32;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.12);
    letter-spacing: 1px;
  }
  .logo span { color: var(--orange); }
  .subtitle {
    font-size: 0.95rem;
    color: #558B2F;
    font-weight: 700;
    margin-top: 2px;
  }

  /* Progress bar */
  .progress-wrap {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    padding: 8px 20px;
  }
  .progress-bar {
    width: min(400px, 80vw);
    height: 18px;
    background: rgba(255,255,255,0.6);
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid #A5D6A7;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #66BB6A, #AED581);
    border-radius: 20px;
    transition: width 0.6s cubic-bezier(.4,2,.6,1);
    position: relative;
    overflow: hidden;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { to { left: 100%; } }
  .progress-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: #2E7D32;
  }

  /* Score & Stars */
  .scoreboard {
    position: relative; z-index: 10;
    display: flex; justify-content: center; gap: 20px;
    padding: 0 20px 10px;
    flex-wrap: wrap;
  }
  .score-badge {
    background: white;
    border-radius: 50px;
    padding: 6px 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #2E7D32;
    box-shadow: 0 4px 12px var(--shadow);
    display: flex; align-items: center; gap: 6px;
    border: 2px solid #C8E6C9;
  }
  .score-badge .icon { font-size: 1.2rem; }

  /* Main card */
  .game-card {
    position: relative; z-index: 10;
    max-width: 600px;
    margin: 0 auto;
    padding: 0 16px 20px;
  }

  .question-banner {
    background: linear-gradient(135deg, #2E7D32, #558B2F);
    color: white;
    border-radius: 20px 20px 0 0;
    padding: 14px 20px;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    box-shadow: 0 4px 16px rgba(46,125,50,0.3);
    position: relative;
    overflow: hidden;
  }
  .question-banner::before {
    content: '🌿';
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    font-size: 1.4rem;
    animation: sway 2s ease-in-out infinite;
  }
  .question-banner::after {
    content: '🌿';
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%) scaleX(-1);
    font-size: 1.4rem;
    animation: sway 2s ease-in-out infinite reverse;
  }
  @keyframes sway {
    0%, 100% { transform: translateY(-50%) rotate(-10deg); }
    50% { transform: translateY(-50%) rotate(10deg); }
  }

  .image-area {
    background: white;
    padding: 20px;
    display: flex; justify-content: center; align-items: center;
    position: relative;
    min-height: 220px;
    overflow: hidden;
  }

  .animal-display {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .animal-emoji {
    font-size: clamp(80px, 20vw, 120px);
    line-height: 1;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
    transition: all 0.3s;
    cursor: default;
    display: block;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    40% { transform: translateY(-12px) scale(1.05); }
    60% { transform: translateY(-8px) scale(1.03); }
  }

  .animal-habitat {
    font-size: 0.85rem;
    background: linear-gradient(135deg, #E8F5E9, #F1F8E9);
    padding: 5px 14px;
    border-radius: 30px;
    color: #388E3C;
    font-weight: 700;
    border: 1.5px solid #C8E6C9;
    display: flex; align-items: center; gap: 5px;
  }

  /* Sparkle ring around image */
  .sparkle-ring {
    position: absolute;
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 3px dashed #A5D6A7;
    animation: rotateRing 8s linear infinite;
    pointer-events: none;
  }
  @keyframes rotateRing { to { transform: rotate(360deg); } }

  /* Options grid */
  .options-grid {
    background: linear-gradient(135deg, #F1F8E9, #E8F5E9);
    padding: 18px;
    border-radius: 0 0 20px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    box-shadow: 0 8px 24px var(--shadow);
  }

  .option-btn {
    background: white;
    border: 3px solid #C8E6C9;
    border-radius: 16px;
    padding: 14px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    font-weight: 800;
    color: #2E7D32;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(.4,2,.6,1);
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  .option-btn:hover:not(:disabled) {
    transform: translateY(-4px) scale(1.03);
    border-color: var(--green);
    box-shadow: 0 8px 20px rgba(76,175,80,0.3);
    background: #F9FBE7;
  }
  .option-btn:active:not(:disabled) {
    transform: scale(0.97);
  }
  .option-btn .opt-emoji {
    font-size: 1.5rem;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: radial-gradient(circle, rgba(76,175,80,0.2), transparent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
  }
  .option-btn:hover::before { width: 200px; height: 200px; }

  .option-btn.correct {
    background: linear-gradient(135deg, #00E676, #69F0AE);
    border-color: #00C853;
    color: white;
    animation: correctPulse 0.5s ease;
    box-shadow: 0 6px 20px rgba(0,200,83,0.5);
  }
  .option-btn.wrong {
    background: linear-gradient(135deg, #FF5252, #FF8A80);
    border-color: #D50000;
    color: white;
    animation: wrongShake 0.4s ease;
    box-shadow: 0 6px 20px rgba(213,0,0,0.4);
  }
  .option-btn.reveal-correct {
    background: linear-gradient(135deg, #00E676, #69F0AE);
    border-color: #00C853;
    color: white;
    box-shadow: 0 6px 20px rgba(0,200,83,0.4);
  }
  .option-btn:disabled { cursor: not-allowed; }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.12); }
    60% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* Feedback overlay */
  .feedback-overlay {
    position: fixed;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .feedback-overlay.show { opacity: 1; pointer-events: all; }

  .feedback-bubble {
    background: white;
    border-radius: 30px;
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: scale(0.5);
    transition: transform 0.4s cubic-bezier(.4,2,.6,1);
    max-width: 340px;
    width: 90%;
    border: 4px solid #A5D6A7;
  }
  .feedback-overlay.show .feedback-bubble { transform: scale(1); }

  .feedback-emoji { font-size: 4rem; animation: popIn 0.4s ease; }
  .feedback-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    margin: 8px 0 4px;
  }
  .feedback-title.good { color: #2E7D32; }
  .feedback-title.bad { color: #C62828; }
  .feedback-msg {
    font-size: 0.95rem;
    color: #555;
    font-weight: 600;
    line-height: 1.4;
  }
  .feedback-fact {
    margin-top: 10px;
    background: #F1F8E9;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 0.88rem;
    color: #388E3C;
    font-weight: 700;
    border-left: 4px solid #66BB6A;
  }
  .next-btn {
    margin-top: 16px;
    background: linear-gradient(135deg, #2E7D32, #66BB6A);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 32px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(46,125,50,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    pointer-events: all;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(46,125,50,0.5); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 200;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Win screen */
  .win-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1B5E20, #2E7D32, #388E3C);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s;
  }
  .win-screen.show { opacity: 1; pointer-events: all; }
  .win-trophy { font-size: 5rem; animation: trophyBounce 1s ease infinite; }
  @keyframes trophyBounce {
    0%, 100% { transform: scale(1) rotate(-5deg); }
    50% { transform: scale(1.15) rotate(5deg); }
  }
  .win-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: #FFD54F;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    margin: 10px 0 5px;
  }
  .win-subtitle { color: #A5D6A7; font-size: 1.1rem; font-weight: 700; }
  .win-score {
    margin: 16px 0;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 14px 30px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: white;
  }
  .restart-btn {
    background: #FFD54F;
    color: #1B5E20;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  .restart-btn:hover { transform: scale(1.05); }

  /* Stars animation */
  .stars-row { display: flex; gap: 8px; justify-content: center; margin: 6px 0; }
  .star { font-size: 1.6rem; opacity: 0.3; transition: all 0.3s; }
  .star.lit { opacity: 1; animation: starPop 0.4s ease; }
  @keyframes starPop {
    0% { transform: scale(0); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); }
    60% { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Image transition */
  .animal-display { transition: opacity 0.3s; }
  .animal-display.fade-out { opacity: 0; transform: scale(0.8); }
  .animal-display.fade-in { animation: fadeInScale 0.5s ease; }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.6) rotate(-10deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }
</style>
</head>
<body>

<div class="bg-shapes" id="bgShapes"></div>

<!-- Header -->
<div class="header">
  <div class="logo">🌍 Eco<span>Kids</span> Explorer</div>
  <div class="subtitle">🌱 Easy Level — Ages 5 to 8 — Identify the Animal!</div>
</div>

<!-- Scoreboard -->
<div class="scoreboard">
  <div class="score-badge"><span class="icon">⭐</span> Score: <span id="scoreVal">0</span></div>
  <div class="score-badge"><span class="icon">🎯</span> Q: <span id="qNum">1</span>/10</div>
  <div class="score-badge"><span class="icon">🔥</span> Streak: <span id="streakVal">0</span></div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0/10</div>
</div>

<!-- Stars -->
<div class="stars-row" id="starsRow">
  <span class="star" id="s1">⭐</span>
  <span class="star" id="s2">⭐</span>
  <span class="star" id="s3">⭐</span>
</div>

<!-- Game Card -->
<div class="game-card">
  <div class="question-banner" id="questionBanner">What animal is this? 🤔</div>

  <div class="image-area">
    <div class="sparkle-ring"></div>
    <div class="animal-display" id="animalDisplay">
      <span class="animal-emoji" id="animalEmoji">🐯</span>
      <div class="animal-habitat" id="habitatTag">🌿 Loading...</div>
    </div>
  </div>

  <div class="options-grid" id="optionsGrid"></div>
</div>

<!-- Feedback Overlay -->
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-bubble">
    <div class="feedback-emoji" id="feedbackEmoji">✅</div>
    <div class="feedback-title" id="feedbackTitle">Correct!</div>
    <div class="feedback-msg" id="feedbackMsg"></div>
    <div class="feedback-fact" id="feedbackFact"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Animal ➡️</button>
  </div>
</div>

<!-- Win Screen -->
<div class="win-screen" id="winScreen">
  <div class="win-trophy">🏆</div>
  <div class="win-title">Amazing Explorer!</div>
  <div class="win-subtitle">You identified all 10 animals! 🎉</div>
  <div class="win-score" id="winScore">Score: 0 / 100</div>
  <button class="restart-btn" onclick="restartGame()">🔄 Play Again!</button>
</div>

<script>
const animals = [
  { emoji: '🐯', name: 'Tiger', habitat: '🌿 Forest', fact: 'Tigers are the largest wild cats and love to swim!', options: ['Tiger', 'Lion', 'Cheetah', 'Leopard'], emoji_map: {'Tiger':'🐯','Lion':'🦁','Cheetah':'🐆','Leopard':'🐆'} },
  { emoji: '🐘', name: 'Elephant', habitat: '🌾 Savanna', fact: 'Elephants never forget! They have amazing memories.', options: ['Hippo', 'Elephant', 'Rhino', 'Giraffe'], emoji_map: {'Hippo':'🦛','Elephant':'🐘','Rhino':'🦏','Giraffe':'🦒'} },
  { emoji: '🦋', name: 'Butterfly', habitat: '🌸 Meadow', fact: 'Butterflies taste food with their feet!', options: ['Moth', 'Dragonfly', 'Butterfly', 'Bee'], emoji_map: {'Moth':'🦗','Dragonfly':'🦟','Butterfly':'🦋','Bee':'🐝'} },
  { emoji: '🐬', name: 'Dolphin', habitat: '🌊 Ocean', fact: 'Dolphins talk to each other using clicks and whistles!', options: ['Shark', 'Dolphin', 'Whale', 'Seal'], emoji_map: {'Shark':'🦈','Dolphin':'🐬','Whale':'🐳','Seal':'🦭'} },
  { emoji: '🦁', name: 'Lion', habitat: '🌾 Savanna', fact: 'A lion\'s roar can be heard 8 km away!', options: ['Tiger', 'Lion', 'Jaguar', 'Puma'], emoji_map: {'Tiger':'🐯','Lion':'🦁','Jaguar':'🐆','Puma':'🦁'} },
  { emoji: '🐸', name: 'Frog', habitat: '💧 Wetland', fact: 'Frogs drink water through their skin, not their mouth!', options: ['Toad', 'Lizard', 'Frog', 'Salamander'], emoji_map: {'Toad':'🐸','Lizard':'🦎','Frog':'🐸','Salamander':'🦎'} },
  { emoji: '🦜', name: 'Parrot', habitat: '🌴 Rainforest', fact: 'Parrots can mimic human speech and live up to 80 years!', options: ['Parrot', 'Toucan', 'Flamingo', 'Peacock'], emoji_map: {'Parrot':'🦜','Toucan':'🦚','Flamingo':'🦩','Peacock':'🦚'} },
  { emoji: '🐼', name: 'Panda', habitat: '🎋 Bamboo Forest', fact: 'Pandas eat bamboo for up to 12 hours a day!', options: ['Koala', 'Panda', 'Bear', 'Raccoon'], emoji_map: {'Koala':'🐨','Panda':'🐼','Bear':'🐻','Raccoon':'🦝'} },
  { emoji: '🦒', name: 'Giraffe', habitat: '🌾 Savanna', fact: 'Giraffes are the tallest animals on Earth!', options: ['Giraffe', 'Camel', 'Zebra', 'Horse'], emoji_map: {'Giraffe':'🦒','Camel':'🐪','Zebra':'🦓','Horse':'🐴'} },
  { emoji: '🐢', name: 'Turtle', habitat: '🏖️ Beach & Sea', fact: 'Sea turtles can live for over 100 years!', options: ['Tortoise', 'Crocodile', 'Turtle', 'Lizard'], emoji_map: {'Tortoise':'🐢','Crocodile':'🐊','Turtle':'🐢','Lizard':'🦎'} },
];

let shuffled = [], current = 0, score = 0, streak = 0, answered = false;
let correctCount = 0;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function initGame() {
  shuffled = shuffle(animals);
  current = 0; score = 0; streak = 0; correctCount = 0;
  answered = false;
  updateHUD();
  showQuestion();
  createBgElements();
}

function createBgElements() {
  const bg = document.getElementById('bgShapes');
  bg.innerHTML = '';
  // Clouds
  for (let i = 0; i < 4; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    const w = 80 + Math.random() * 100;
    c.style.cssText = `width:${w}px;height:${w*0.4}px;top:${Math.random()*60}%;left:-200px;animation-duration:${18+Math.random()*14}s;animation-delay:${-Math.random()*20}s;opacity:${0.4+Math.random()*0.4}`;
    bg.appendChild(c);
  }
  // Leaves
  const leafEmojis = ['🍃','🌿','🍀','🌱'];
  for (let i = 0; i < 8; i++) {
    const l = document.createElement('div');
    l.className = 'leaf-bg';
    l.textContent = leafEmojis[Math.floor(Math.random()*leafEmojis.length)];
    l.style.cssText = `left:${Math.random()*100}%;bottom:-50px;font-size:${1.2+Math.random()*1.5}rem;animation-duration:${8+Math.random()*10}s;animation-delay:${-Math.random()*10}s`;
    bg.appendChild(l);
  }
}

function showQuestion() {
  answered = false;
  const a = shuffled[current];
  const display = document.getElementById('animalDisplay');

  display.classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('animalEmoji').textContent = a.emoji;
    document.getElementById('habitatTag').textContent = a.habitat;
    document.getElementById('questionBanner').textContent = `What animal is this? 🤔`;
    display.classList.remove('fade-out');
    display.classList.add('fade-in');
    setTimeout(() => display.classList.remove('fade-in'), 500);
  }, 300);

  // Options
  const opts = shuffle(a.options);
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    const em = a.emoji_map[opt] || '❓';
    btn.innerHTML = `<span class="opt-emoji">${em}</span> ${opt}`;
    btn.onclick = () => handleAnswer(btn, opt, a);
    grid.appendChild(btn);
  });

  updateHUD();
}

function handleAnswer(btn, chosen, animal) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const correct = chosen === animal.name;

  if (correct) {
    btn.classList.add('correct');
    score += 10 + (streak >= 2 ? 5 : 0);
    streak++;
    correctCount++;
    showFeedback(true, animal);
    launchConfetti();
  } else {
    btn.classList.add('wrong');
    streak = 0;
    // Reveal correct
    btns.forEach(b => {
      if (b.textContent.trim().includes(animal.name)) b.classList.add('reveal-correct');
    });
    showFeedback(false, animal);
  }

  updateHUD();
}

function showFeedback(correct, animal) {
  const overlay = document.getElementById('feedbackOverlay');
  document.getElementById('feedbackEmoji').textContent = correct ? '🎉' : '😅';
  document.getElementById('feedbackTitle').textContent = correct ? 'Correct! Amazing!' : 'Oops! Not quite...';
  document.getElementById('feedbackTitle').className = 'feedback-title ' + (correct ? 'good' : 'bad');
  document.getElementById('feedbackMsg').textContent = correct
    ? `Yes! That is a ${animal.name}! You are so smart! 🌟`
    : `That was a ${animal.name}! Don't worry, keep trying! 💪`;
  document.getElementById('feedbackFact').textContent = `🌱 Fun Fact: ${animal.fact}`;
  overlay.classList.add('show');

  // Update stars based on correctCount
  const starThresholds = [3, 6, 10];
  starThresholds.forEach((t, i) => {
    const star = document.getElementById(`s${i+1}`);
    if (correctCount >= t) star.classList.add('lit');
  });
}

function nextQuestion() {
  document.getElementById('feedbackOverlay').classList.remove('show');
  current++;
  if (current >= shuffled.length) {
    showWin();
  } else {
    showQuestion();
  }
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('qNum').textContent = Math.min(current + 1, 10);
  document.getElementById('streakVal').textContent = streak;
  const pct = (current / shuffled.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${current}/${shuffled.length}`;
}

function showWin() {
  document.getElementById('winScore').textContent = `⭐ Score: ${score} / 100`;
  document.getElementById('winScreen').classList.add('show');
  for (let i = 0; i < 80; i++) {
    setTimeout(() => launchSingleConfetti(), i * 40);
  }
}

function restartGame() {
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('s1').classList.remove('lit');
  document.getElementById('s2').classList.remove('lit');
  document.getElementById('s3').classList.remove('lit');
  initGame();
}

function launchConfetti() {
  const colors = ['#4CAF50','#FFD54F','#FF80AB','#87CEEB','#CE93D8','#FFA726'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${20+Math.random()*60}%;
        top: 0;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        width:${6+Math.random()*8}px;
        height:${6+Math.random()*8}px;
        animation-duration:${1.5+Math.random()}s;
        animation-delay:${Math.random()*0.3}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }, i * 30);
  }
}

function launchSingleConfetti() {
  const colors = ['#4CAF50','#FFD54F','#FF80AB','#87CEEB','#CE93D8','#FFA726','#FF5252','#69F0AE'];
  const el = document.createElement('div');
  el.className = 'confetti-piece';
  el.style.cssText = `
    left:${Math.random()*100}%;
    top: 0;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    border-radius:${Math.random()>0.5?'50%':'2px'};
    width:${8+Math.random()*10}px;
    height:${8+Math.random()*10}px;
    animation-duration:${2+Math.random()*1.5}s;
    animation-delay:0s;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Start!
initGame();
</script>
</body>
</html>
