<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Boxes 🧠 - Fun Matching Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ec4899;
            --primary-light: #fdf2f8;
            --secondary: #6366f1;
            --bg: #fffafb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Gochi Hand', cursive, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: white;
            border: 2px solid var(--primary);
            padding: 10px 20px;
            border-radius: 12px;
            color: var(--primary);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--primary);
            transition: all 0.1s;
        }

        .back-btn:active { transform: translateY(4px); box-shadow: 0 0 0 white; }

        .logo { font-size: 2.2rem; color: var(--primary); }

        .game-area {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
            margin-top: 20px;
        }

        .card {
            aspect-ratio: 1/1;
            background: #fff;
            border: 3px solid #fecdd3;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .card-front { background: #fecdd3; color: white; }
        .card-back { background: white; transform: rotateY(180deg); color: #333; }

        .card.matched {
            animation: matchPop 0.5s ease forwards;
            pointer-events: none;
            opacity: 0.7;
        }

        @keyframes matchPop {
            0% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.2) rotateY(180deg); }
            100% { transform: scale(1) rotateY(180deg); }
        }

        .stats {
            margin-top: 30px;
            font-size: 1.5rem;
            color: #4b5563;
            display: flex;
            gap: 30px;
        }

        /* Win Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .win-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 5px dotted var(--primary);
        }

        .restart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1.5rem;
            margin-top: 20px;
            cursor: pointer;
        }

        footer { margin-top: auto; padding: 20px; color: #9ca3af; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='index.html'">← Back</button>
        <h1 class="logo">Memory Boxes</h1>
        <div style="font-size: 1.5rem; color: #4b5563">Moves: <span id="moves">0</span></div>
    </div>

    <div class="game-area" id="gameArea"></div>

    <div class="stats">
        <div>Matches: <span id="matches">0/8</span></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="win-box">
            <h1 style="font-size: 4rem;">🧁</h1>
            <h2 style="font-size: 3rem; color: var(--primary)">Delicious Win!</h2>
            <p style="font-size: 1.5rem;">You matched all food boxes!</p>
            <button class="restart-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <footer>Fun for ages 5 to 8! Smart Learning.</footer>

    <script>
        const emojis = ['🍇', '🍓', '🥕', '🥦', '🌽', '🍕', '🧁', '🍦', '🍇', '🍓', '🥕', '🥦', '🌽', '🍕', '🧁', '🍦'];
        let flippedCardsCount = 0;
        let firstCard = null;
        let secondCard = null;
        let canFlip = true;
        let moves = 0;
        let matches = 0;

        function shuffle(array) {
            array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const gameArea = document.getElementById('gameArea');
            shuffle(emojis);
            emojis.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-front">?</div>
                    <div class="card-back">${emoji}</div>
                `;
                card.onclick = () => flipCard(card, emoji);
                gameArea.appendChild(card);
            });
        }

        function flipCard(card, emoji) {
            if (!canFlip || card === firstCard || card.classList.contains('flipped')) return;

            card.classList.add('flipped');
            if (!firstCard) {
                firstCard = { card, emoji };
            } else {
                secondCard = { card, emoji };
                checkMatch();
            }
        }

        function checkMatch() {
            moves++;
            document.getElementById('moves').textContent = moves;
            canFlip = false;

            if (firstCard.emoji === secondCard.emoji) {
                firstCard.card.classList.add('matched');
                secondCard.card.classList.add('matched');
                matches++;
                document.getElementById('matches').textContent = `${matches}/8`;
                resetFlip();
                if (matches === 8) {
                    setTimeout(() => document.getElementById('overlay').style.display = 'flex', 500);
                }
            } else {
                setTimeout(() => {
                    firstCard.card.classList.remove('flipped');
                    secondCard.card.classList.remove('flipped');
                    resetFlip();
                }, 1000);
            }
        }

        function resetFlip() {
            firstCard = null;
            secondCard = null;
            canFlip = true;
        }

        createBoard();
    </script>
</body>
</html>
